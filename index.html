<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel de Conteúdo · Template Agência IA</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#0B2545; --navy-2:#13315C; --steel:#134074; --accent:#EF7B24; --accent-2:#F59E0B;
  --bg:#F1F4F9; --card:#FFFFFF; --line:#E2E8F0; --muted:#64748B; --text:#1E293B;
  --green:#16A34A; --amber:#D97706; --blue:#2563EB; --violet:#7C3AED;
  --sh:0 1px 2px rgba(15,23,42,.06),0 8px 24px rgba(15,23,42,.06);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);display:flex;min-height:100vh}
button{font-family:inherit}
.side{width:250px;background:linear-gradient(175deg,var(--navy),var(--navy-2));color:#fff;padding:20px 16px;display:flex;flex-direction:column;position:sticky;top:0;height:100vh;flex-shrink:0}
.brand{display:flex;align-items:center;gap:11px;padding:6px 6px 14px}
.logo{width:38px;height:38px;border-radius:10px;background:var(--accent);display:grid;place-items:center;font-weight:800;font-size:17px;box-shadow:0 4px 12px rgba(239,123,36,.35);color:#fff}
.brand .n{font-weight:800;font-size:15px;letter-spacing:-.01em;line-height:1.15}
.brand .s{font-size:11px;color:#9FB3D1;font-weight:500}
.cliSel{display:flex;gap:6px;margin:2px 4px 14px}
.cliSel select{flex:1;background:rgba(255,255,255,.08);color:#fff;border:1px solid rgba(255,255,255,.14);border-radius:8px;padding:8px 9px;font-size:13px;font-weight:600}
.cliSel select option{color:#111}
.icobtn{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.14);color:#fff;border-radius:8px;width:34px;cursor:pointer;font-size:15px}
.icobtn:hover{background:rgba(239,123,36,.3)}
.nav{display:flex;flex-direction:column;gap:3px;margin-top:2px}
.nav button{all:unset;cursor:pointer;display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:9px;font-size:14px;font-weight:500;color:#C7D5E8;transition:.15s}
.nav button:hover{background:rgba(255,255,255,.07);color:#fff}
.nav button.on{background:rgba(239,123,36,.16);color:#fff;font-weight:600}
.nav button.on .ic{color:var(--accent-2)}
.ic{width:19px;text-align:center;font-size:15px}
.badge-n{margin-left:auto;background:var(--accent);color:#fff;font-size:11px;font-weight:700;border-radius:20px;padding:1px 8px}
.side .foot{margin-top:auto;display:flex;flex-direction:column;gap:7px;padding-top:12px;border-top:1px solid rgba(255,255,255,.08)}
.sbtn{all:unset;cursor:pointer;font-size:12px;color:#9FB3D1;padding:6px 8px;border-radius:7px;display:flex;align-items:center;gap:8px}
.sbtn:hover{background:rgba(255,255,255,.07);color:#fff}
.main{flex:1;display:flex;flex-direction:column;min-width:0}
.top{background:var(--card);border-bottom:1px solid var(--line);padding:15px 30px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:10}
.top h1{font-size:19px;font-weight:700;letter-spacing:-.01em}
.top .sub{font-size:13px;color:var(--muted);margin-top:1px}
.add{margin-left:auto;background:var(--accent);color:#fff;border:none;border-radius:9px;padding:10px 16px;font-size:13px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:7px;box-shadow:0 4px 12px rgba(239,123,36,.3)}
.add:hover{filter:brightness(1.07)}
.content{padding:26px 30px;overflow-y:auto}
.view{display:none;animation:fade .3s ease}
.view.on{display:block}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px}
.stat{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:17px 19px;box-shadow:var(--sh)}
.stat .lab{font-size:12px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.04em;display:flex;align-items:center;gap:7px}
.stat .num{font-size:29px;font-weight:800;margin-top:7px;letter-spacing:-.02em}
.stat .delta{font-size:12px;font-weight:600;margin-top:2px;color:var(--muted)}
.dot{width:9px;height:9px;border-radius:50%;display:inline-block}
.grid2{display:grid;grid-template-columns:1.4fr 1fr;gap:20px}
.stack{display:flex;flex-direction:column;gap:20px}
.panel{background:var(--card);border:1px solid var(--line);border-radius:14px;box-shadow:var(--sh);overflow:hidden}
.panel h2{font-size:14px;font-weight:700;padding:15px 19px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:9px}
.panel h2 .tag{margin-left:auto;font-size:11px;font-weight:600;color:var(--muted)}
.plist{padding:4px 0}
.prow{display:flex;flex-direction:column;align-items:stretch;gap:12px;padding:14px 19px;border-bottom:1px solid #F1F5F9;cursor:pointer;transition:.12s}
.prow:last-child{border-bottom:none}.prow:hover{background:#F8FAFC}
.prow-top{display:flex;align-items:center;gap:12px}
.prow-top .info{flex:1;min-width:0}
.mini{display:flex;padding:2px 4px 0}
.mini .s{flex:1;text-align:center;position:relative;font-size:10px;color:var(--muted);font-weight:600}
.mini .s::before{content:'';position:absolute;top:8px;left:50%;width:100%;height:2px;background:var(--line);z-index:0}
.mini .s:last-child::before{display:none}
.mini .s.done::before{background:#BBE7CB}
.mini .s .d{width:18px;height:18px;border-radius:50%;background:var(--line);color:#fff;display:grid;place-items:center;margin:0 auto 4px;font-size:10px;position:relative;z-index:1}
.mini .s.done .d{background:var(--green)}
.mini .s.cur .d{background:var(--accent)}
.mini .s.cur{color:var(--text)}
.thumb{width:50px;height:36px;border-radius:7px;flex-shrink:0;background:linear-gradient(135deg,var(--steel),var(--navy));display:grid;place-items:center;color:#fff;font-size:14px}
.prow .t{font-size:14px;font-weight:600}.prow .m{font-size:12px;color:var(--muted);margin-top:2px}
.chip{font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;white-space:nowrap}
.c-autoridade{background:#EEF2FF;color:var(--violet)}
.c-captacao{background:#FFF7ED;color:var(--amber)}
.c-redes_sociais{background:#E0F2FE;color:#0369A1}
.c-institucional{background:#F1F5F9;color:#334155}
.c-reuniao{background:#FCE7F3;color:#BE185D}
.st{margin-left:auto;font-size:12px;font-weight:600;color:var(--muted)}
.board{display:grid;grid-template-columns:repeat(7,minmax(158px,1fr));gap:11px;overflow-x:auto;padding-bottom:8px}
.col{background:#EAEFF5;border-radius:13px;padding:11px;min-height:320px;min-width:0}
.col.drag{outline:2px dashed var(--accent);outline-offset:-4px}
.col h3{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:#475569;display:flex;align-items:center;gap:7px;padding:4px 6px 11px}
.col h3 .ct{margin-left:auto;background:#fff;border:1px solid var(--line);border-radius:20px;padding:0 8px;font-size:11px;color:var(--muted)}
.vcard{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:11px;margin-bottom:9px;cursor:grab;box-shadow:0 1px 2px rgba(15,23,42,.05);transition:.15s;border-left:3px solid var(--steel)}
.vcard:hover{transform:translateY(-2px);box-shadow:var(--sh)}
.vcard.dragging{opacity:.5}
.vcard .vt{font-size:13px;font-weight:600;line-height:1.35;margin-bottom:8px;overflow-wrap:anywhere}
.vcard .vf{display:flex;align-items:center;justify-content:space-between}
.vcard .vd{font-size:11px;color:var(--muted);font-weight:500}
.stage-agendado{border-left-color:#0EA5E9}.stage-roteiro{border-left-color:var(--muted)}.stage-captacao{border-left-color:var(--blue)}.stage-edicao{border-left-color:var(--violet)}.stage-modificacoes{border-left-color:#E11D48}.stage-aprovacao{border-left-color:var(--amber)}.stage-publicado{border-left-color:var(--green)}.stage-finalizado{border-left-color:#0F766E}
.cal{background:var(--card);border:1px solid var(--line);border-radius:14px;box-shadow:var(--sh);overflow:hidden}
.calnav{display:flex;align-items:center;gap:14px;padding:13px 18px;border-bottom:1px solid var(--line);font-weight:700;font-size:14px}
.calnav .a{cursor:pointer;color:var(--muted);font-size:18px;user-select:none;padding:0 6px}
.cal .hd{display:grid;grid-template-columns:repeat(7,1fr);background:var(--navy);color:#fff}
.cal .hd div{padding:10px;font-size:12px;font-weight:600;text-align:center}
.cal .bd{display:grid;grid-template-columns:repeat(7,1fr)}
.cell{min-height:92px;border-right:1px solid var(--line);border-bottom:1px solid var(--line);padding:6px 7px;font-size:12px}
.cell .dn{color:var(--muted);font-weight:600}
.cell.out{background:#FAFBFC}.cell.today{background:#FFF7ED}.cell.today .dn{color:var(--accent);font-weight:800}
.ev{margin-top:4px;border-radius:6px;padding:4px 7px;font-size:11px;font-weight:600;color:#fff;cursor:pointer;line-height:1.25}
.evbar{margin-top:4px;height:3px;border-radius:3px;background:rgba(255,255,255,.35);overflow:hidden}
.evbar span{display:block;height:100%;border-radius:3px;background:#fff}
.dots{display:flex;gap:5px;align-items:center;margin-top:9px}
.dots i{width:8px;height:8px;border-radius:50%;background:var(--line);flex-shrink:0}
.dots i.done{background:var(--green)}
.dots i.cur{background:var(--accent);box-shadow:0 0 0 3px rgba(239,123,36,.18)}
.dots .lbl-cur{margin-left:auto;font-size:10px;font-weight:700;color:var(--muted)}
.assets{display:grid;grid-template-columns:repeat(auto-fill,minmax(185px,1fr));gap:14px}
.asset{background:var(--card);border:1px solid var(--line);border-radius:12px;overflow:hidden;box-shadow:var(--sh);position:relative}
.asset .im{height:112px;background:linear-gradient(135deg,var(--steel),var(--navy));display:grid;place-items:center;color:#fff;font-size:26px;position:relative}
.asset .bd{padding:10px 12px}.asset .at{font-size:13px;font-weight:600}.asset .am{font-size:11px;color:var(--muted);margin-top:2px}
.stbadge{position:absolute;top:8px;right:8px;font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px}
.disp{background:#DCFCE7;color:#15803D}.usado{background:#E2E8F0;color:#475569}
.del{position:absolute;top:6px;left:6px;background:rgba(0,0,0,.45);color:#fff;border:none;width:22px;height:22px;border-radius:6px;cursor:pointer;font-size:13px;display:none}
.asset:hover .del{display:block}
.aprow{background:var(--card);border:1px solid var(--line);border-radius:13px;box-shadow:var(--sh);padding:17px 19px;margin-bottom:13px;display:flex;gap:17px;align-items:center}
.aprow .big{width:110px;height:68px;border-radius:9px;background:linear-gradient(135deg,var(--steel),var(--navy));display:grid;place-items:center;color:#fff;font-size:20px;flex-shrink:0}
.aprow .t{font-size:15px;font-weight:700}.aprow .m{font-size:12.5px;color:var(--muted);margin-top:3px}
.acts{margin-left:auto;display:flex;gap:9px;flex-shrink:0}
.btn{all:unset;cursor:pointer;font-size:13px;font-weight:600;padding:9px 15px;border-radius:9px;text-align:center;transition:.15s}
.btn-ok{background:var(--green);color:#fff}.btn-ok:hover{filter:brightness(1.08)}
.btn-adj{background:#fff;border:1px solid var(--line);color:var(--amber)}.btn-adj:hover{background:#FFF7ED}
.empty{text-align:center;color:var(--muted);padding:46px;font-size:14px}
.overlay{position:fixed;inset:0;background:rgba(11,37,69,.55);backdrop-filter:blur(3px);display:none;place-items:center;z-index:50;padding:20px}
.overlay.on{display:grid}
.modal{background:#fff;border-radius:18px;max-width:540px;width:100%;box-shadow:0 24px 60px rgba(0,0,0,.3);overflow:hidden;animation:pop .25s ease;max-height:92vh;overflow-y:auto}
@keyframes pop{from{transform:scale(.96);opacity:0}to{transform:none;opacity:1}}
.mtop{padding:20px 24px 0;display:flex;align-items:center}
.mtop h3{font-size:18px;font-weight:800}
.mtop .x{margin-left:auto;cursor:pointer;font-size:22px;color:var(--muted)}
.mb{padding:16px 24px 24px}
.fld{margin-bottom:14px}
.fld label{display:block;font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.03em;margin-bottom:6px}
.fld input,.fld select,.fld textarea{width:100%;border:1px solid var(--line);border-radius:9px;padding:10px 12px;font-size:14px;font-family:inherit;background:#fff}
.fld textarea{resize:vertical;min-height:70px}
.fld input:focus,.fld select:focus,.fld textarea:focus{outline:none;border-color:var(--accent)}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.msave{background:var(--accent);color:#fff;border:none;border-radius:10px;padding:12px;font-size:14px;font-weight:700;cursor:pointer;width:100%;margin-top:6px}
.msave:hover{filter:brightness(1.07)}
.gcal{background:#fff;border:1px solid var(--line);color:#1a73e8;border-radius:10px;padding:11px;font-size:13.5px;font-weight:700;cursor:pointer;width:100%;margin-top:6px;display:flex;align-items:center;justify-content:center;gap:8px}
.gcal:hover{background:#F1F6FE;border-color:#1a73e8}
.mdel{background:none;border:none;color:#DC2626;font-size:13px;font-weight:600;cursor:pointer;width:100%;margin-top:10px;padding:8px}
.time{margin:16px 0;display:flex}
.time .step{flex:1;text-align:center;font-size:10.5px;color:var(--muted);position:relative;font-weight:600}
.time .step::before{content:'';position:absolute;top:9px;left:50%;width:100%;height:2px;background:var(--line)}
.time .step:last-child::before{display:none}
.time .step .d{width:20px;height:20px;border-radius:50%;background:var(--line);color:#fff;display:grid;place-items:center;margin:0 auto 6px;font-size:11px;position:relative;z-index:1}
.time .step.done .d{background:var(--green)}.time .step.cur .d{background:var(--accent)}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--navy);color:#fff;padding:13px 22px;border-radius:11px;font-size:14px;font-weight:600;box-shadow:0 12px 30px rgba(0,0,0,.3);z-index:60;transition:.35s}
.toast.on{transform:translateX(-50%) translateY(0)}
.tpl-tag{position:fixed;top:10px;right:12px;background:#0B2545;color:#fff;font-size:10px;font-weight:800;letter-spacing:.06em;padding:4px 10px;border-radius:20px;z-index:40;text-transform:uppercase}
.color-row{display:flex;gap:8px;flex-wrap:wrap}
.sw{width:30px;height:30px;border-radius:8px;cursor:pointer;border:2px solid transparent}
.sw.on{border-color:#0B2545}
@media(max-width:1000px){.stats{grid-template-columns:repeat(2,1fr)}.grid2{grid-template-columns:1fr}.board{grid-template-columns:1fr}.side{width:60px}.brand .n,.brand .s,.nav button .lbl,.cliSel,.side .foot .lbl{display:none}}
</style>
</head>
<body>
<aside class="side">
  <div class="brand">
    <div class="logo" id="brandLogo">A</div>
    <div><div class="n" id="brandName">Cliente</div><div class="s" id="brandSub">Painel de Conteúdo</div></div>
  </div>
  <div class="cliSel">
    <select id="cliSelect" onchange="switchClient(this.value)"></select>
    <button class="icobtn" title="Novo cliente" onclick="newClient()">+</button>
  </div>
  <nav class="nav" id="nav">
    <button data-v="dash" class="on"><span class="ic">▤</span><span class="lbl">Dashboard</span></button>
    <button data-v="pipe"><span class="ic">▦</span><span class="lbl">Pipeline</span></button>
    <button data-v="cal"><span class="ic">▧</span><span class="lbl">Calendário</span></button>
    <button data-v="apr"><span class="ic">✓</span><span class="lbl">Aprovações</span><span class="badge-n" id="aprN">0</span></button>
  </nav>
  <div class="foot">
    <button class="sbtn" onclick="openSettings()">⚙️ <span class="lbl">Marca & configurações</span></button>
    <button class="sbtn" onclick="exportICS()">📅 <span class="lbl">Exportar p/ Google Agenda (.ics)</span></button>
    <button class="sbtn" onclick="exportClient()">⬇️ <span class="lbl">Exportar cliente (JSON)</span></button>
    <button class="sbtn" onclick="document.getElementById('imp').click()">⬆️ <span class="lbl">Importar cliente</span></button>
    <input type="file" id="imp" accept="application/json" style="display:none" onchange="importClient(event)">
  </div>
</aside>

<div class="main">
  <header class="top">
    <div><h1 id="vTitle">Dashboard</h1><div class="sub" id="vSub">Visão geral da produção</div></div>
    <button class="add" id="addBtn" onclick="addVideo()">＋ Nova tarefa</button>
  </header>
  <div class="content">
    <section class="view on" id="dash">
      <div class="stats" id="stats"></div>
      <div class="grid2">
        <div class="panel"><h2>▦ Produção <span class="tag" id="prodTag"></span></h2><div class="plist" id="dashList"></div></div>
        <div class="stack">
          <div class="panel"><h2>✓ Aguardando aprovação <span class="tag">cliente</span></h2><div class="plist" id="dashApr"></div></div>
          <div class="panel"><h2>✎ Modificações solicitadas <span class="tag" id="modsN">0</span></h2><div class="plist" id="dashMods"></div></div>
        </div>
      </div>
    </section>
    <section class="view" id="pipe"><div class="board" id="board"></div></section>
    <section class="view" id="cal">
      <div class="cal">
        <div class="calnav"><span class="a" onclick="calMove(-1)">‹</span><span id="calLabel"></span><span class="a" onclick="calMove(1)">›</span></div>
        <div class="hd"><div>Dom</div><div>Seg</div><div>Ter</div><div>Qua</div><div>Qui</div><div>Sex</div><div>Sáb</div></div>
        <div class="bd" id="calBody"></div>
      </div>
    </section>
    <section class="view" id="apr"><div id="aprList"></div></section>
  </div>
</div>

<div class="overlay" id="overlay"><div class="modal" id="modal"></div></div>
<div class="toast" id="toast"></div>

<script>
const OBJ={autoridade:'Autoridade',captacao:'Captação',redes_sociais:'Redes Sociais',institucional:'Institucional',reuniao:'Reunião'};
const STAGES=[['agendado','Agendado'],['roteiro','Roteiro'],['captacao','Captação'],['edicao','Edição'],['modificacoes','Modificações Solicitadas'],['aprovacao','Aprovação'],['publicado','Publicado'],['finalizado','Finalizado']];
const SLAB=Object.fromEntries(STAGES);
const shortLab=k=>k==='modificacoes'?'Modificações':SLAB[k];
const EVC={autoridade:'#7C3AED',captacao:'#D97706',redes_sociais:'#0284C7',institucional:'#475569',reuniao:'#DB2777'};
const KEY='toolkit-painel-v3';
const $=s=>document.querySelector(s),$$=s=>document.querySelectorAll(s);
const uid=()=>Math.random().toString(36).slice(2,9);
const todayISO=()=>new Date().toISOString().slice(0,10);

// ---- safe storage (não quebra em file:// / modo privado) ----
function lsGet(k){try{return localStorage.getItem(k)}catch(e){return null}}
function lsSet(k,v){try{localStorage.setItem(k,v)}catch(e){}}

function seedClient(name){
  const t=todayISO();
  return {id:uid(),brand:{name:name||'Novo Cliente',sub:'Painel de Conteúdo',accent:'#EF7B24',logo:(name||'N')[0].toUpperCase()},
    videos:[
      {id:uid(),cliente:name||'',titulo:'Vídeo institucional — bastidores',objetivo:'institucional',estagio:'edicao',inicio:t,entrega:t,roteiro:'Roteiro do vídeo. Edite este texto.',mods:''},
      {id:uid(),cliente:name||'',titulo:'Depoimento de cliente',objetivo:'autoridade',estagio:'aprovacao',inicio:t,entrega:t,roteiro:'Prova social. Edite este texto.',mods:''}
    ]};
}
let store=load();
function load(){
  try{const s=JSON.parse(lsGet(KEY));if(s&&s.clients&&s.clients.length)return s;}catch(e){}
  const c=seedClient('Cliente Exemplo');return {clients:[c],current:c.id};
}
function save(){lsSet(KEY,JSON.stringify(store))}
function cur(){return store.clients.find(c=>c.id===store.current)||store.clients[0]}

let calDate=new Date();
let curView='dash';

function applyBrand(){
  const b=cur().brand;
  document.documentElement.style.setProperty('--accent',b.accent);
  $('#brandLogo').textContent=b.logo||'A';$('#brandLogo').style.background=b.accent;
  $('#brandName').textContent=b.name;$('#brandSub').textContent=b.sub;
}
function renderClientSelect(){
  $('#cliSelect').innerHTML=store.clients.map(c=>`<option value="${c.id}" ${c.id===store.current?'selected':''}>${esc(c.brand.name)}</option>`).join('');
}
const esc=s=>String(s==null?'':s).replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));
const fmtD=d=>{if(!d)return'—';const p=d.split('-');return p[2]+'/'+p[1]};

function miniStepper(est){
  const si=STAGES.findIndex(s=>s[0]===est);
  return `<div class="mini">${STAGES.map((s,i)=>`<div class="s ${i<si?'done':i===si?'cur':''}"><div class="d">${i<si?'✓':i+1}</div>${shortLab(s[0])}</div>`).join('')}</div>`;
}
function miniDots(est){
  const si=STAGES.findIndex(s=>s[0]===est);
  return `<div class="dots">${STAGES.map((s,i)=>`<i class="${i<si?'done':i===si?'cur':''}" title="${s[1]}"></i>`).join('')}<span class="lbl-cur">${shortLab(est)}</span></div>`;
}
function stagePct(est){const si=STAGES.findIndex(s=>s[0]===est);return Math.round(si/(STAGES.length-1)*100);}
function render(){
  const c=cur();applyBrand();renderClientSelect();
  const V=c.videos;
  const prod=V.filter(v=>['agendado','roteiro','captacao','edicao','modificacoes'].includes(v.estagio));
  const pend=V.filter(v=>v.estagio==='aprovacao');
  const mods=V.filter(v=>v.estagio==='modificacoes');
  // próxima entrega (data futura mais próxima entre os não concluídos)
  const futuras=V.filter(v=>!['publicado','finalizado'].includes(v.estagio)&&v.entrega).map(v=>v.entrega).sort();
  const prox=futuras.find(d=>d>=todayISO())||futuras[0];
  $('#stats').innerHTML=`
    <div class="stat"><div class="lab"><span class="dot" style="background:var(--blue)"></span>Em produção</div><div class="num">${prod.length}</div><div class="delta">agendado · roteiro · captação · edição · modificações</div></div>
    <div class="stat"><div class="lab"><span class="dot" style="background:#E11D48"></span>Modificações</div><div class="num">${mods.length}</div><div class="delta">${mods.length?'aguardando ajuste':'nenhuma pendente'}</div></div>
    <div class="stat"><div class="lab"><span class="dot" style="background:var(--amber)"></span>Aguard. aprovação</div><div class="num">${pend.length}</div><div class="delta">${pend.length?'ação necessária':'tudo em dia'}</div></div>
    <div class="stat"><div class="lab"><span class="dot" style="background:var(--accent)"></span>Próxima entrega</div><div class="num" style="font-size:22px">${prox?fmtD(prox):'—'}</div><div class="delta">data de entrega mais próxima</div></div>`;
  $('#prodTag').textContent=V.length+' peças';
  $('#dashList').innerHTML=V.length?V.map(v=>`
    <div class="prow" onclick="openV('${v.id}')">
      <div class="prow-top"><div class="thumb">▶</div>
        <div class="info"><div class="t">${esc(v.titulo)}</div><div class="m">Entrega ${fmtD(v.entrega)}${v.cliente?' · '+esc(v.cliente):''}</div></div>
        <span class="chip c-${v.objetivo}">${OBJ[v.objetivo]}</span><span class="st">${shortLab(v.estagio)}</span></div>
      ${miniStepper(v.estagio)}</div>`).join('')
    :'<div class="empty">Nenhuma tarefa. Clique em “＋ Nova tarefa”.</div>';
  $('#modsN').textContent=mods.length;
  $('#dashMods').innerHTML=mods.length?mods.map(v=>`
    <div class="prow" onclick="openV('${v.id}')"><div class="thumb" style="background:linear-gradient(135deg,#E11D48,#BE123C)">✎</div>
      <div><div class="t">${esc(v.titulo)}</div><div class="m">${v.mods?esc(v.mods):'Sem detalhes registrados'}</div></div><span class="st" style="color:#E11D48">Ver →</span></div>`).join('')
    :'<div class="empty">Nenhuma modificação pendente.</div>';
  $('#dashApr').innerHTML=pend.length?pend.map(v=>`
    <div class="prow" onclick="go('apr')"><div class="thumb" style="background:linear-gradient(135deg,var(--amber),var(--accent))">⏳</div>
      <div><div class="t">${esc(v.titulo)}</div><div class="m">Aguardando aprovação</div></div><span class="st" style="color:var(--amber)">Revisar →</span></div>`).join('')
    :'<div class="empty">Tudo aprovado. 🎉</div>';
  $('#aprN').textContent=pend.length;$('#aprN').style.display=pend.length?'':'none';
  $('#board').innerHTML=STAGES.map(([k,lab])=>{
    const vs=V.filter(v=>v.estagio===k);
    return `<div class="col" data-stage="${k}"><h3>${lab}<span class="ct">${vs.length}</span></h3>
      ${vs.map(v=>`<div class="vcard stage-${k}" draggable="true" data-id="${v.id}" onclick="openV('${v.id}')">
        <div class="vt">${esc(v.titulo)}</div><div class="vf"><span class="chip c-${v.objetivo}">${OBJ[v.objetivo]}</span><span class="vd">${fmtD(v.entrega)}</span></div>${miniDots(v.estagio)}</div>`).join('')}</div>`;
  }).join('');
  bindDrag();
  $('#aprList').innerHTML=pend.length?pend.map(v=>`
    <div class="aprow"><div class="big">▶</div>
      <div><div class="t">${esc(v.titulo)}</div><div class="m">${esc(v.roteiro)}</div>
        <div style="margin-top:8px"><span class="chip c-${v.objetivo}">${OBJ[v.objetivo]}</span></div></div>
      <div class="acts"><button class="btn btn-adj" onclick="adjust('${v.id}')">Pedir ajuste</button><button class="btn btn-ok" onclick="approve('${v.id}')">Aprovar</button></div></div>`).join('')
    :'<div class="empty">Nenhum vídeo aguardando aprovação. ✓</div>';
  renderCal();save();
}

function renderCal(){
  const c=cur();const y=calDate.getFullYear(),mo=calDate.getMonth();
  const first=new Date(y,mo,1).getDay();const days=new Date(y,mo+1,0).getDate();
  $('#calLabel').textContent=calDate.toLocaleDateString('pt-BR',{month:'long',year:'numeric'});
  let cells='';for(let i=0;i<first;i++)cells+='<div class="cell out"></div>';
  const tISO=todayISO();
  for(let d=1;d<=days;d++){
    const iso=`${y}-${String(mo+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const evs=c.videos.filter(v=>v.entrega===iso);
    cells+=`<div class="cell${iso===tISO?' today':''}"><div class="dn">${d}</div>
      ${evs.map(ev=>`<div class="ev" style="background:${EVC[ev.objetivo]}" onclick="openV('${ev.id}')" title="${esc(ev.titulo)} · ${SLAB[ev.estagio]}">${esc(ev.titulo.slice(0,22))}${ev.titulo.length>22?'…':''}<div class="evbar"><span style="width:${stagePct(ev.estagio)}%"></span></div></div>`).join('')}</div>`;
  }
  $('#calBody').innerHTML=cells;
}
function calMove(d){calDate.setMonth(calDate.getMonth()+d);renderCal()}

function bindDrag(){
  let dragId=null;
  $$('.vcard').forEach(el=>{
    el.addEventListener('dragstart',e=>{dragId=el.dataset.id;el.classList.add('dragging');e.stopPropagation()});
    el.addEventListener('dragend',()=>{el.classList.remove('dragging');$$('.col').forEach(c=>c.classList.remove('drag'))});
  });
  $$('.col').forEach(col=>{
    col.addEventListener('dragover',e=>{e.preventDefault();col.classList.add('drag')});
    col.addEventListener('dragleave',()=>col.classList.remove('drag'));
    col.addEventListener('drop',e=>{e.preventDefault();const v=cur().videos.find(x=>x.id===dragId);if(v){v.estagio=col.dataset.stage;render();toast('Movido para '+SLAB[col.dataset.stage])}});
  });
}

const TITLES={dash:['Dashboard','Visão geral da produção'],pipe:['Pipeline de Produção','Arraste os cards entre as etapas'],cal:['Calendário Editorial','Datas de entrega no mês'],apr:['Aprovações','Valide as peças em 1 clique']};
function go(v){curView=v;$$('.view').forEach(x=>x.classList.remove('on'));$('#'+v).classList.add('on');
  $$('#nav button').forEach(b=>b.classList.toggle('on',b.dataset.v===v));
  $('#vTitle').textContent=TITLES[v][0];$('#vSub').textContent=TITLES[v][1];
  $('#addBtn').style.display='flex';
}
$('#nav').addEventListener('click',e=>{const b=e.target.closest('button');if(b)go(b.dataset.v)});

function openModal(html){$('#modal').innerHTML=html;$('#overlay').classList.add('on')}
function closeM(){$('#overlay').classList.remove('on')}
$('#overlay').addEventListener('click',e=>{if(e.target.id==='overlay')closeM()});

function openV(id){
  const v=cur().videos.find(x=>x.id===id);const si=STAGES.findIndex(s=>s[0]===v.estagio);
  openModal(`<div class="mtop"><h3>Detalhe do vídeo</h3><span class="x" onclick="closeM()">✕</span></div>
    <div class="mb">
      <div class="fld"><label>Nome do cliente</label><input id="e_cliente" value="${esc(v.cliente)}" placeholder="Ex: Transcouto Transportes"></div>
      <div class="fld"><label>Título</label><input id="e_titulo" value="${esc(v.titulo)}"></div>
      <div class="fld"><label>Objetivo</label><select id="e_obj">${Object.entries(OBJ).map(([k,l])=>`<option value="${k}" ${k===v.objetivo?'selected':''}>${l}</option>`).join('')}</select></div>
      <div class="frow">
        <div class="fld"><label>Data de início</label><input type="date" id="e_inicio" value="${v.inicio||''}"></div>
        <div class="fld"><label>Data de entrega</label><input type="date" id="e_entrega" value="${v.entrega||''}"></div>
      </div>
      <div class="fld"><label>Estágio</label><select id="e_est" onchange="toggleModsFld(this.value)">${STAGES.map(([k,l])=>`<option value="${k}" ${k===v.estagio?'selected':''}>${l}</option>`).join('')}</select></div>
      <div class="fld" id="fld_mods" style="${v.estagio==='modificacoes'?'':'display:none'}"><label>Modificações solicitadas pelo cliente</label><textarea id="e_mods" placeholder="Ex: Trocar a trilha sonora, cortar os 5 segundos finais...">${esc(v.mods)}</textarea></div>
      <div class="fld"><label>Roteiro</label><textarea id="e_rot">${esc(v.roteiro)}</textarea></div>
      <div class="time">${STAGES.map((s,i)=>`<div class="step ${i<si?'done':i===si?'cur':''}"><div class="d">${i<si?'✓':i+1}</div>${shortLab(s[0])}</div>`).join('')}</div>
      <button class="gcal" onclick="gcalOpen('${id}')">📅 Adicionar ao Google Agenda</button>
      <button class="msave" onclick="saveV('${id}')">Salvar alterações</button>
      <button class="mdel" onclick="delV('${id}')">Excluir</button>
    </div>`);
}
function addVideo(){
  const v={id:uid(),cliente:cur().brand.name||'',titulo:'',objetivo:'redes_sociais',estagio:'agendado',inicio:todayISO(),entrega:todayISO(),roteiro:'',mods:''};
  cur().videos.push(v);openV(v.id);
}
function toggleModsFld(est){$('#fld_mods').style.display=est==='modificacoes'?'':'none'}
function saveV(id){
  const v=cur().videos.find(x=>x.id===id);
  v.cliente=$('#e_cliente').value.trim();
  v.titulo=$('#e_titulo').value.trim()||'(sem título)';v.objetivo=$('#e_obj').value;
  v.inicio=$('#e_inicio').value||'';v.entrega=$('#e_entrega').value||'';
  v.estagio=$('#e_est').value;v.roteiro=$('#e_rot').value.trim();
  v.mods=$('#e_mods')?$('#e_mods').value.trim():(v.mods||'');
  closeM();render();toast('Vídeo salvo ✓');
}
function delV(id){if(!confirm('Excluir este vídeo?'))return;const c=cur();c.videos=c.videos.filter(x=>x.id!==id);closeM();render();toast('Vídeo excluído')}
function approve(id){const v=cur().videos.find(x=>x.id===id);v.estagio='publicado';closeM();render();go('dash');toast('✓ Aprovado e publicado')}
function adjust(id){const v=cur().videos.find(x=>x.id===id);const txt=prompt('O que o cliente pediu para modificar?',v.mods||'');if(txt===null)return;v.mods=txt.trim();v.estagio='modificacoes';closeM();render();go('dash');toast('↩ Modificações solicitadas registradas')}

const SWATCHES=['#EF7B24','#2563EB','#16A34A','#7C3AED','#DC2626','#0891B2','#DB2777','#0B2545'];
function openSettings(){
  const b=cur().brand;
  openModal(`<div class="mtop"><h3>Marca & configurações</h3><span class="x" onclick="closeM()">✕</span></div><div class="mb">
    <div class="fld"><label>Nome do cliente</label><input id="b_name" value="${esc(b.name)}"></div>
    <div class="fld"><label>Subtítulo</label><input id="b_sub" value="${esc(b.sub)}"></div>
    <div class="frow"><div class="fld"><label>Inicial do logo</label><input id="b_logo" value="${esc(b.logo)}" maxlength="2"></div>
    <div class="fld"><label>Cor de destaque</label><input id="b_accent" value="${b.accent}"></div></div>
    <div class="fld"><label>Cores rápidas</label><div class="color-row">${SWATCHES.map(s=>`<div class="sw ${s===b.accent?'on':''}" style="background:${s}" onclick="document.getElementById('b_accent').value='${s}';document.querySelectorAll('.sw').forEach(x=>x.classList.remove('on'));this.classList.add('on')"></div>`).join('')}</div></div>
    <button class="msave" onclick="saveSettings()">Salvar</button>
    <button class="mdel" onclick="delClient()">Excluir este cliente</button></div>`);
}
function saveSettings(){const b=cur().brand;b.name=$('#b_name').value.trim()||'Cliente';b.sub=$('#b_sub').value.trim();b.logo=($('#b_logo').value.trim()||b.name[0]).toUpperCase();b.accent=$('#b_accent').value.trim()||'#EF7B24';closeM();render();toast('Marca atualizada ✓')}

function switchClient(id){store.current=id;calDate=new Date();render();go('dash')}
function newClient(){const name=prompt('Nome do novo cliente:');if(!name)return;const c=seedClient(name);store.clients.push(c);store.current=c.id;render();go('dash');toast('Cliente criado ✓')}
function delClient(){if(store.clients.length<=1){alert('Deixe ao menos um cliente.');return}if(!confirm('Excluir este cliente e todos os dados dele?'))return;store.clients=store.clients.filter(c=>c.id!==store.current);store.current=store.clients[0].id;closeM();render();go('dash');toast('Cliente excluído')}

function exportClient(){const c=cur();const blob=new Blob([JSON.stringify(c,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=(c.brand.name.toLowerCase().replace(/[^a-z0-9]+/g,'-'))+'-painel.json';a.click();toast('Exportado ✓')}
function importClient(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=()=>{try{const c=JSON.parse(r.result);c.id=uid();if(!c.brand||!c.videos)throw 0;store.clients.push(c);store.current=c.id;render();go('dash');toast('Cliente importado ✓')}catch(_){alert('Arquivo inválido.')}};r.readAsText(f);e.target.value=''}

// ---- Google Agenda ----
function nextDayYMD(ymd){const dt=new Date(ymd+'T00:00:00');dt.setDate(dt.getDate()+1);return dt.toISOString().slice(0,10).replace(/-/g,'')}
function icsEsc(s){return String(s==null?'':s).replace(/\\/g,'\\\\').replace(/;/g,'\\;').replace(/,/g,'\\,').replace(/\r?\n/g,'\\n')}
function eventDesc(v){return `Cliente: ${v.cliente||'—'}\nData de entrega: ${v.entrega||'—'}\nObjetivo: ${OBJ[v.objetivo]}\nEtapa atual: ${SLAB[v.estagio]}${v.inicio?'\nInício da produção: '+v.inicio:''}${v.mods?'\nModificações solicitadas: '+v.mods:''}\n\n${v.roteiro||''}`}
function exportICS(){
  const c=cur();const vids=c.videos.filter(v=>v.entrega);
  if(!vids.length){alert('Nenhum vídeo com data de entrega para exportar.');return}
  const stamp=new Date().toISOString().replace(/[-:]/g,'').split('.')[0]+'Z';
  let L=['BEGIN:VCALENDAR','VERSION:2.0','PRODID:-//Painel de Conteudo//Toolkit//PT','CALSCALE:GREGORIAN','METHOD:PUBLISH','X-WR-CALNAME:Conteúdo — '+icsEsc(c.brand.name)];
  vids.forEach(v=>{const d=v.entrega.replace(/-/g,'');
    L.push('BEGIN:VEVENT','UID:'+v.id+'@painel-conteudo','DTSTAMP:'+stamp,
      'DTSTART;VALUE=DATE:'+d,'DTEND;VALUE=DATE:'+nextDayYMD(v.entrega),
      'SUMMARY:'+icsEsc('🎬 Entrega: '+v.titulo),'DESCRIPTION:'+icsEsc(eventDesc(v)),'END:VEVENT');});
  L.push('END:VCALENDAR');
  const blob=new Blob([L.join('\r\n')],{type:'text/calendar'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download=c.brand.name.toLowerCase().replace(/[^a-z0-9]+/g,'-')+'-agenda.ics';a.click();
  toast('Arquivo .ics baixado — importe no Google Agenda');
}
function gcalUrl(v){
  if(!v.entrega)return null;
  const d=v.entrega.replace(/-/g,'');
  return 'https://calendar.google.com/calendar/render?action=TEMPLATE'
    +'&text='+encodeURIComponent('🎬 Entrega: '+v.titulo)
    +'&dates='+d+'/'+nextDayYMD(v.entrega)
    +'&details='+encodeURIComponent(eventDesc(v));
}
function gcalOpen(id){const v=cur().videos.find(x=>x.id===id);const u=gcalUrl(v);if(!u){alert('Defina uma data de entrega primeiro.');return}window.open(u,'_blank')}

let tt;function toast(m){const t=$('#toast');t.textContent=m;t.classList.add('on');clearTimeout(tt);tt=setTimeout(()=>t.classList.remove('on'),2400)}

render();
</script>
