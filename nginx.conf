server {
    listen       80;
    listen  [::]:80;
    server_name  localhost;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), camera=(), microphone=(self)" always;

    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
    }

    # index.html, sw.js e manifest.json nunca devem ficar em cache no navegador:
    # sem isso, deploys novos só aparecem depois de limpar o cache manualmente.
    location ~* ^/(index\.html|sw\.js|manifest\.json)$ {
        root   /usr/share/nginx/html;
        add_header Cache-Control "no-store, must-revalidate" always;
    }

    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /usr/share/nginx/html;
    }
}
